<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Spa System Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="top-bar">

<h2>Spa System</h2>

<button id="themeToggle">🌙</button>

</div>

<div class="dashboard-container">

<h1>Dashboard</h1>

<div class="stats">

<div class="card">
<div class="card-title">Clientes</div>
<div class="card-number">24</div>
</div>

<div class="card">
<div class="card-title">Citas Hoy</div>
<div class="card-number">6</div>
</div>

<div class="card">
<div class="card-title">Servicios</div>
<div class="card-number">5</div>
</div>

<div class="card">
<div class="card-title">Ingresos</div>
<div class="card-number">$2150</div>
</div>

</div>

<h2>Ingresos de la semana</h2>

<canvas id="revenueChart"></canvas>

<br><br>

<h2>Últimas citas</h2>

<table>

<thead>

<tr>
<th>Cliente</th>
<th>Servicio</th>
<th>Fecha</th>
<th>Hora</th>
</tr>

</thead>

<tbody>

<tr>
<td>Ana</td>
<td>Masaje</td>
<td>2026-03-07</td>
<td>10:00</td>
</tr>

<tr>
<td>Luis</td>
<td>Facial</td>
<td>2026-03-07</td>
<td>11:30</td>
</tr>

<tr>
<td>Maria</td>
<td>Spa</td>
<td>2026-03-07</td>
<td>14:00</td>
</tr>

</tbody>

</table>

<br>

<button onclick="logout()">Cerrar sesión</button>

</div>

<script src="js/dashboard.js"></script>

</body>

</html>
