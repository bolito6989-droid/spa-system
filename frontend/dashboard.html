<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Spa System Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar">

<h2 class="logo">Spa System</h2>

<ul class="menu">

<li class="active">📊 Dashboard</li>
<li onclick="location.href='clients.html'">👥 Clientes</li>
<li>📅 Citas</li>
<li>💰 Facturación</li>
<li>📈 Reportes</li>
<li>⚙️ Configuración</li>

</ul>

<button onclick="logout()" class="logout">

Cerrar sesión

</button>

</div>

<!-- CONTENIDO -->

<div class="main">

<div class="topbar">

<h1>Dashboard</h1>

<button id="themeToggle">🌙</button>

</div>

<!-- STATS -->

<div class="stats">

<div class="card">
<div class="title">Clientes</div>
<div class="number">24</div>
</div>

<div class="card">
<div class="title">Citas Hoy</div>
<div class="number">6</div>
</div>

<div class="card">
<div class="title">Servicios</div>
<div class="number">5</div>
</div>

<div class="card">
<div class="title">Ingresos</div>
<div class="number">$2150</div>
</div>

</div>

<!-- CHART -->

<h2>Ingresos de la semana</h2>

<canvas id="revenueChart"></canvas>

<br><br>

<h2>Agenda de citas</h2>

<div id="calendar"></div>

</div>

</div>

<script src="js/dashboard.js"></script>

</body>

</html>
