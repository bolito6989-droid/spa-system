<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<div class="top-bar">

<h2>Spa System</h2>

<button id="themeToggle">🌙</button>

</div>

<div class="dashboard">

<h1>Dashboard</h1>

<div class="stats">

<div class="card">

Clientes

<div class="number" id="clientesTotal">0</div>

</div>

<div class="card">

Citas Hoy

<div class="number" id="citasHoy">0</div>

</div>

<div class="card">

Servicios

<div class="number">6</div>

</div>

<div class="card">

Ingresos

<div class="number">$2150</div>

</div>

</div>

<h3>Citas recientes</h3>

<table>

<thead>

<tr>

<th>Cliente</th>
<th>Servicio</th>
<th>Fecha</th>
<th>Hora</th>

</tr>

</thead>

<tbody id="tablaCitas">

</tbody>

</table>

<br>

<button onclick="logout()">Cerrar sesión</button>

</div>

<script src="js/dashboard.js"></script>

</body>

</html>
