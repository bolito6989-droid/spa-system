<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Spa System Dashboard</title>

<link rel="stylesheet" href="css/theme.css">

</head>

<body class="dashboard-body">

<div class="dashboard-container">

<h1>Dashboard Spa System</h1>

<div class="stats">

<div class="card">

Clientes

<div class="number" id="clientesTotal">0</div>

</div>

<div class="card">

Citas hoy

<div class="number" id="citasHoy">0</div>

</div>

<div class="card">

Servicios

<div class="number">6</div>

</div>

<div class="card">

Ingresos

<div class="number">$2150</div>

</div>

</div>

<h2>Citas recientes</h2>

<table>

<thead>

<tr>

<th>Cliente</th>

<th>Servicio</th>

<th>Fecha</th>

<th>Hora</th>

</tr>

</thead>

<tbody id="tablaCitas">

</tbody>

</table>

<button class="dashboard-btn" onclick="logout()">Cerrar sesión</button>

</div>

<script src="js/dashboard.js"></script>

</body>

</html>
