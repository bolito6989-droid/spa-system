<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clientes - Spa System</title>

<link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar">

<h2 class="logo">Spa System</h2>

<ul class="menu">

<li onclick="location.href='dashboard.html'">📊 Dashboard</li>
<li class="active">👥 Clientes</li>
<li>📅 Citas</li>
<li>💰 Facturación</li>
<li>📈 Reportes</li>
<li>⚙️ Configuración</li>

</ul>

<button onclick="logout()" class="logout">

Cerrar sesión

</button>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>Clientes</h1>

<button id="themeToggle">🌙</button>

</div>

<!-- FORM -->

<div class="card">

<h2>Registrar cliente</h2>

<input id="nombre" placeholder="Nombre">

<input id="telefono" placeholder="Teléfono">

<input id="email" placeholder="Email">

<button onclick="agregarCliente()">Agregar cliente</button>

</div>

<br>

<!-- BUSQUEDA -->

<input id="buscar" placeholder="Buscar cliente" onkeyup="buscarCliente()">

<br><br>

<!-- TABLA -->

<table>

<thead>

<tr>

<th>Nombre</th>
<th>Teléfono</th>
<th>Email</th>
<th>Acción</th>

</tr>

</thead>

<tbody id="tablaClientes">

</tbody>

</table>

</div>

</div>

<script src="js/clients.js"></script>

</body>

</html>
